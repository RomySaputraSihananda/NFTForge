name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test-frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment:
      name: github-pages
      url: https://romys.my.id/NFTForge
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - run: yarn nx run frontend:build
        env:
          VITE_CONTRACT_ADDRESS: ${{ vars.VITE_CONTRACT_ADDRESS }}
          VITE_RPC_URL: ${{ vars.VITE_RPC_URL }}
          VITE_PINATA_JWT: ${{ secrets.VITE_PINATA_JWT }}

      - name: Add CNAME
        run: echo "romys.my.id" > apps/web/dist/CNAME

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

      - uses: actions/deploy-pages@v4
